name: Django Backend CI

on:
  pull_request:
  push:
    branches: main

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core  # Subdiretório core é o diretório de trabalho padrão
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"

      - name: Install dependencies (using poetry)
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry install --with dev --sync

      - name: Apply migrations
        run: |
          poetry run python ../manage.py makemigrations usuario  # Caminho atualizado
          poetry run python ../manage.py migrate  # Caminho atualizado

      - name: Run Linter Flake8
        run: poetry run flake8 .

      - name: Run backend Tests
        run: poetry run pytest --cache-clear