{% extends 'base.html' %}
    <title>Relatório</title>
    {% block link %}<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>{% endblock %}

{% block content %}
    <h1>Relatório de Vagas e Candidatos</h1>

    <canvas id="vagasPorMes"></canvas>
    <canvas id="candidatosPorMes"></canvas>

    <script>
        // Gráfico de Vagas Criadas por Mês
        var ctx1 = document.getElementById('vagasPorMes').getContext('2d');
        var chart1 = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: {{ meses|safe }},
                datasets: [{
                    label: 'Vagas Criadas por Mês',
                    data: {{ vagas|safe }},
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        // Gráfico de Candidatos Recebidos por Mês
        var ctx2 = document.getElementById('candidatosPorMes').getContext('2d');
        var chart2 = new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: {{ meses_candidatos|safe }},
                datasets: [{
                    label: 'Candidatos Recebidos por Mês',
                    data: {{ candidatos|safe }},
                    backgroundColor: 'rgba(153, 102, 255, 0.2)',
                    borderColor: 'rgba(153, 102, 255, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
{% endblock %}
