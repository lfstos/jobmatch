{% extends 'base.html' %}
{% block title %} Registrar Candidato{% endblock %}

{% block navbar %}
    <a class="nav-link active" aria-current="page" href="{% url 'register_empresa' %}">Registrar Empresa</a>
{% endblock %}

{% block content %}
    <div class="container mt-5">
        <h1>Registrar Candidato</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Registrar</button>
        </form>
        <a href="{% url 'login' %}">Já tem uma conta? Faça login aqui</a>
    </div>
{% endblock %}
